<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Размер экрана</title>
<meta name="robots" content="noindex">
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  html,body { height:100%; }
  body {
    background:#0d0d0d; color:#f2ede4;
    font-family:-apple-system,Segoe UI,Roboto,sans-serif;
    display:flex; align-items:center; justify-content:center;
    padding:16px; text-align:center;
  }
  .box { width:100%; max-width:640px; }
  .big { font-size:clamp(34px,12vw,72px); font-weight:900; color:#f0b429; line-height:1.1; }
  .lbl { font-size:14px; color:#8a857e; text-transform:uppercase; letter-spacing:.08em; margin-top:22px; }
  .val { font-size:22px; font-weight:700; margin-top:4px; }
  .ua  { font-size:12px; color:#b9b4ac; margin-top:6px; word-break:break-all; line-height:1.5;
         background:#161616; border:1px solid rgba(255,255,255,.08); border-radius:10px; padding:12px; }
  .hint{ font-size:13px; color:#8a857e; margin-top:26px; }
</style>
</head>
<body>
  <div class="box">
    <div class="lbl">Размер страницы (CSS)</div>
    <div class="big" id="vp">—</div>

    <div class="lbl">Физический экран</div>
    <div class="val" id="scr">—</div>

    <div class="lbl">Плотность (DPR)</div>
    <div class="val" id="dpr">—</div>

    <div class="lbl">Ориентация</div>
    <div class="val" id="ori">—</div>

    <div class="lbl">Браузер</div>
    <div class="ua" id="ua">—</div>

    <div class="hint">Поверни планшет так, как он будет стоять в зале, и пришли мне эти цифры (или скриншот).</div>
  </div>
<script>
  function upd(){
    var w = window.innerWidth, h = window.innerHeight;
    document.getElementById('vp').textContent  = w + ' \u00d7 ' + h;
    document.getElementById('scr').textContent = (screen.width||'?') + ' \u00d7 ' + (screen.height||'?');
    document.getElementById('dpr').textContent = (window.devicePixelRatio || 1);
    document.getElementById('ori').textContent = (w >= h) ? 'Альбомная (горизонт.)' : 'Портретная (вертик.)';
    document.getElementById('ua').textContent  = navigator.userAgent;
  }
  upd();
  window.addEventListener('resize', upd);
  window.addEventListener('orientationchange', function(){ setTimeout(upd, 200); });
</script>
</body>
</html>
